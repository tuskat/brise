services:
  brise:
    build: .
    container_name: brise
    ports:
      - "4321:4321"   # Main Brise dashboard (SSR)
      - "4322:4322"   # Docs site (static)
    volumes:
      - ./data:/app/data           # SQLite DB (holds personas, proxies, history)
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
